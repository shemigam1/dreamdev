<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" defer src="app.js"></script>
    <title>Document</title>
  </head>
  <body>
    <main class="app">
      <header class="mode-toggle">
        <button class="mode-btn active" id="btn-simple">Simple</button>
        <button class="mode-btn" id="btn-market">Market Mode</button>
      </header>

      <section class="display">
        <p class="display-expression" id="expression"></p>
        <output class="display-total" id="total">0</output>
      </section>

      <section class="market-panel hidden" id="market-panel">
        <ul class="item-list" id="item-list"></ul>

        <div class="add-item-bar">
          <input
            type="text"
            id="item-name"
            placeholder="Item name (optional)"
          />
          <input
            type="text"
            id="item-price"
            placeholder="₦ Price"
            inputmode="numeric"
          />
          <button id="add-item-btn">+ Add</button>
        </div>

        <!-- <div class="discount-row">
          <span class="disc-label">Discount</span>
          <button class="disc-btn" data-pct="5">5%</button>
          <button class="disc-btn" data-pct="10">10%</button>
          <button class="disc-btn" data-pct="20">20%</button>
          <button class="disc-btn" data-pct="0" id="custom-disc-btn">
            Custom
          </button>
        </div> -->
      </section>

      <section class="numpad" aria-label="Number pad">
        <button class="key key-accent" id="clear-btn">AC</button>
        <button class="key" data-val="del" id="del-btn" aria-label="Delete">
          ⌫
        </button>
        <button class="key" data-val="%">%</button>
        <button class="key key-operator" data-val="/">÷</button>

        <button class="key" data-val="7">7</button>
        <button class="key" data-val="8">8</button>
        <button class="key" data-val="9">9</button>
        <button class="key key-operator" data-val="*">×</button>

        <button class="key" data-val="4">4</button>
        <button class="key" data-val="5">5</button>
        <button class="key" data-val="6">6</button>
        <button class="key key-operator" data-val="-">−</button>

        <button class="key" data-val="1">1</button>
        <button class="key" data-val="2">2</button>
        <button class="key" data-val="3">3</button>
        <button class="key key-operator" data-val="+">+</button>

        <button class="key key-wide" data-val="000">000</button>
        <button class="key" data-val="0">0</button>
        <button class="key key-primary" id="equals-btn">=</button>
      </section>

      <footer class="bottom-actions">
        <button class="action-btn" id="history-btn">History</button>
        <button class="action-btn" id="clear-btn">Clear</button>
        <!-- <button class="action-btn" id="share-btn">Share</button> -->
      </footer>

      <aside
        class="history-panel hidden"
        id="history-panel"
        aria-label="Calculation history"
      >
        <div class="history-header">
          <h2>History</h2>
          <button
            class="history-close"
            id="history-close"
            aria-label="Close history"
          >
            ×
          </button>
        </div>
        <ul class="history-list" id="history-list"></ul>
        <div class="history-footer">
          <button class="history-clear-btn" id="history-clear-btn">
            Clear history
          </button>
        </div>
      </aside>
    </main>
  </body>
</html>
