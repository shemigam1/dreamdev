# Server block for serving the SPA. Replaces the stock default.conf.
#
# This standalone frontend image has NO /api proxy - the SPA calls the
# backend directly by absolute URL via VITE_APP_BASE_URL. (The evolved
# monorepo image proxies /api/* internally to a sibling "server" container,
# which doesn't apply when frontend and backend live on different hosts.)

server {
    # Port 8080 because nginx-unprivileged can't bind <1024 without root.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck endpoint. Cheap (no file IO), independent of the SPA bundle.
    # Used by:
    #   - Dockerfile HEALTHCHECK
    #   - Render's healthcheck setting (point Health Check Path here)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # Static assets: Vite outputs hashed filenames under /assets/, so the URL
    # IS the cache key. Safe to cache for a year. `immutable` tells the
    # browser it never needs to revalidate.
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any request that doesn't match a file falls back to
    # index.html so React Router can handle the path on the client side.
    # Without this, deep-linking to e.g. /elections/123 would 404 on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
